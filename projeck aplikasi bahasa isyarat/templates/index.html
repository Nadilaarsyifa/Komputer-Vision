<!DOCTYPE html>
<html>
<head>

    <title>Sign Language Recognition</title>

    <style>

        body{
            text-align:center;
            font-family:Arial;
            background:#f5f5f5;
        }

        img{
            width:800px;
            border:5px solid black;
            border-radius:10px;
        }

        button{
            padding:12px 20px;
            margin:10px;
            font-size:18px;
            cursor:pointer;
        }

    </style>

</head>
<body>

    <h1>Sign Language Recognition</h1>

    <div>

        <button onclick="setMode('huruf')">Huruf</button>

        <button onclick="setMode('angka')">Angka</button>

        <button onclick="setMode('kata')">Kata</button>

    </div>

    <img id="videoFeed" src="{{ url_for('video') }}">

    <script>

    function setMode(mode){

        fetch('/set_mode/' + mode)

        .then(response => response.text())

        .then(data => {

          console.log(data)

        // refresh stream video
        document.getElementById("videoFeed").src =
            "/video?" + new Date().getTime()

     })

    }

    </script>

</body>
</html>
